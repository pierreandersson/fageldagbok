name: Deploy to pierrea.se

on:
  push:
    branches: [main]
    paths: [krysslista/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y -qq sshpass
          sshpass -p "${{ secrets.FTP_PASS }}" sftp -oBatchMode=no -oStrictHostKeyChecking=no ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} <<EOF
          cd krysslista
          put krysslista/.htaccess
          put krysslista/api.php
          put krysslista/auth-start.php
          put krysslista/auth-callback.php
          put krysslista/logout.php
          put krysslista/token-helpers.php
          put krysslista/seed-from-api.php
          EOF
